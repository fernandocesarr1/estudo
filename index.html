<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f6f3ec">
  <title>Estudo PMESP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="loading" class="screen">
      <div class="loading-text">Carregando</div>
    </div>
  </div>

  <!-- Modal de explicação detalhada -->
  <div id="modal-explicacao" class="modal" hidden>
    <div class="modal-content">
      <button class="modal-close" data-action="fechar-modal" aria-label="Fechar">×</button>
      <div id="modal-explicacao-conteudo"></div>
    </div>
  </div>

  <!-- Toast para feedback -->
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
